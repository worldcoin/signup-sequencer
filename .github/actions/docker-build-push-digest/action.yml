name: Docker Build And Push Digest
description: Build a single-platform Docker image, push by digest, and upload the digest artifact.

inputs:
  platform:
    description: Docker target platform (for example linux/amd64).
    required: true
  registry:
    description: Docker registry host.
    required: true
  image_name:
    description: Full image name path (for example org/repo).
    required: true

runs:
  using: composite
  steps:
    - name: Prepare
      shell: bash
      run: |
        platform='${{ inputs.platform }}'
        ref_name='${{ github.ref_name }}'
        echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
        echo "CACHE_SCOPE=${ref_name//\//-}" >> "$GITHUB_ENV"

    - name: Log in to Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.registry }}/${{ inputs.image_name }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile
        tags: ${{ inputs.registry }}/${{ inputs.image_name }}
        platforms: ${{ inputs.platform }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}-${{ env.PLATFORM_PAIR }}
        cache-to: type=gha,scope=${{ env.CACHE_SCOPE }}-${{ env.PLATFORM_PAIR }},mode=max
        outputs: type=registry,push-by-digest=true,name-canonical=true,push=true

    - name: Export digest
      shell: bash
      run: |
        mkdir -p "${{ runner.temp }}/digests"
        digest="${{ steps.build.outputs.digest }}"
        touch "${{ runner.temp }}/digests/${digest#sha256:}"

    - name: Upload digest
      uses: actions/upload-artifact@v4
      with:
        name: digests-${{ env.PLATFORM_PAIR }}
        path: ${{ runner.temp }}/digests/*
        if-no-files-found: error
        retention-days: 1
