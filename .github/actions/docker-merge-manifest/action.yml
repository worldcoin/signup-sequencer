name: Docker Merge Manifest
description: Merge per-platform pushed digests into a multi-platform manifest and push tags.

inputs:
  registry:
    description: Docker registry host.
    required: true
  image_name:
    description: Full image name path (for example org/repo).
    required: true
  tags:
    description: Tag rules for docker/metadata-action (newline-separated).
    required: true

runs:
  using: composite
  steps:
    - name: Download digests
      uses: actions/download-artifact@v4
      with:
        path: ${{ runner.temp }}/digests
        pattern: digests-*
        merge-multiple: true

    - name: Log in to Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.registry }}/${{ inputs.image_name }}
        tags: ${{ inputs.tags }}

    - name: Create manifest list and push
      shell: bash
      working-directory: ${{ runner.temp }}/digests
      env:
        REGISTRY: ${{ inputs.registry }}
        IMAGE_NAME: ${{ inputs.image_name }}
      run: |
        docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
          $(printf "$REGISTRY/$IMAGE_NAME@sha256:%s " *)

    - name: Print image tags
      shell: bash
      env:
        TAGS: ${{ steps.meta.outputs.tags }}
      run: |
        echo "### 🐳 Docker image tags" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        while IFS= read -r tag; do
          [ -n "$tag" ] && echo "- \`$tag\`" >> "$GITHUB_STEP_SUMMARY"
        done <<< "$TAGS"
        echo ""
        echo "Built image tags:"
        echo "$TAGS"

    - name: Inspect image
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
        IMAGE_NAME: ${{ inputs.image_name }}
        IMAGE_VERSION: ${{ steps.meta.outputs.version }}
      run: |
        docker buildx imagetools inspect "$REGISTRY/$IMAGE_NAME:$IMAGE_VERSION"
